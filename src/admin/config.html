<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💈 Configuración - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">💈</span>
      <span class="font-bold text-lg text-amber-400">Barbería Bot</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="/admin/dashboard.html" class="text-gray-300 hover:text-white">Inicio</a>
      <a href="/admin/barberos.html" class="text-gray-300 hover:text-white">Barberos</a>
      <a href="/admin/servicios.html" class="text-gray-300 hover:text-white">Servicios</a>
      <a href="/admin/citas.html" class="text-gray-300 hover:text-white">Citas</a>
      <a href="/admin/config.html" class="text-amber-400 font-medium">Configuración</a>
      <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm">Salir</button>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold mb-6">Configuración</h1>

    <!-- Info leída de .env -->
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 mb-6">
      <h2 class="text-lg font-semibold mb-4">Información Actual del Bot</h2>
      <div class="space-y-3" id="configInfo">
        <div class="text-gray-500 text-sm">Cargando...</div>
      </div>
    </div>

    <!-- Estado del bot -->
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-6 mt-6">
      <h2 class="text-lg font-semibold mb-4">Estado del Servidor</h2>
      <div id="statusInfo" class="text-gray-400 text-sm">Verificando...</div>
      <button onclick="verificarEstado()" class="mt-4 bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-lg text-sm">Verificar estado</button>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = '/admin/index.html';
    const api = (url, opts = {}) => fetch(url, { headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, ...opts });
    function logout() { localStorage.removeItem('adminToken'); window.location.href = '/admin/index.html'; }

    async function cargarConfig() {
      const res = await api('/api/admin/config');
      if (res.status === 401) { logout(); return; }
      const config = await res.json();
      const container = document.getElementById('configInfo');
      container.innerHTML = `
        <div class="grid grid-cols-2 gap-3">
          ${renderItem('Nombre del negocio', config.nombre)}
          ${renderItem('Dirección', config.direccion)}
          ${renderItem('Hora apertura', config.horaApertura)}
          ${renderItem('Hora cierre', config.horaCierre)}
          ${renderItem('Servicio predeterminado', config.servicioPredeterminado)}
          ${renderItem('Mosaico barberos', config.mosaicoUrl ? '✅ Configurado' : '❌ No configurado')}
          ${renderItem('Tel. jefe barbero', config.jefeBarberTelefono || '❌ No configurado')}
          ${renderItem('Tel. administradora', config.administradoraTelefono || '❌ No configurado')}
        </div>
      `;
    }

    function renderItem(label, value) {
      return `
        <div class="bg-gray-700/50 rounded-lg p-3">
          <div class="text-xs text-gray-400 mb-1">${label}</div>
          <div class="font-medium text-sm">${value || '—'}</div>
        </div>
      `;
    }

    async function verificarEstado() {
      const div = document.getElementById('statusInfo');
      try {
        const res = await fetch('/health');
        const data = await res.json();
        div.innerHTML = `<span class="text-green-400">✅ Servidor activo</span> · ${data.timestamp}`;
      } catch {
        div.innerHTML = '<span class="text-red-400">❌ Error al conectar con el servidor</span>';
      }
    }

    cargarConfig();
    verificarEstado();
  </script>
</body>
</html>
