<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💈 Barberos - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">💈</span>
      <span class="font-bold text-lg text-amber-400">Barbería Bot</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="/admin/dashboard.html" class="text-gray-300 hover:text-white">Inicio</a>
      <a href="/admin/barberos.html" class="text-amber-400 font-medium">Barberos</a>
      <a href="/admin/servicios.html" class="text-gray-300 hover:text-white">Servicios</a>
      <a href="/admin/citas.html" class="text-gray-300 hover:text-white">Citas</a>
      <a href="/admin/clientes.html" class="text-gray-300 hover:text-white">Clientes</a>
      <a href="/admin/config.html" class="text-gray-300 hover:text-white">Configuración</a>
      <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm">Salir</button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Barberos</h1>
      <button onclick="abrirModal()" class="bg-amber-500 hover:bg-amber-600 text-black font-bold py-2 px-5 rounded-lg">+ Nuevo Barbero</button>
    </div>

    <div id="listaBarberos" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <!-- Modal Barbero -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl w-full max-w-2xl max-h-screen overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-xl font-bold" id="modalTitulo">Nuevo Barbero</h2>
        <button onclick="cerrarModal()" class="text-gray-400 hover:text-white text-2xl">✕</button>
      </div>

      <form id="barberForm" class="space-y-4">
        <input type="hidden" id="barberId">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 text-sm mb-1">Nombre *</label>
            <input id="bNombre" type="text" required class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
          <div>
            <label class="block text-gray-300 text-sm mb-1">Teléfono (notificaciones) *</label>
            <input id="bTelefono" type="text" required placeholder="573001234567" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>
        </div>
        <div>
          <label class="block text-gray-300 text-sm mb-1">Especialidades (separadas por coma)</label>
          <input id="bEspecialidades" type="text" placeholder="Corte clásico, Degradado, Barba" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>
        <div>
          <label class="block text-gray-300 text-sm mb-1">URL de foto</label>
          <input id="bFotoUrl" type="url" placeholder="https://..." class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>

        <!-- Horarios -->
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-3">Horarios de trabajo</label>
          <div class="space-y-2" id="horariosForm">
            <!-- generado por JS -->
          </div>
        </div>

        <div id="formError" class="hidden text-red-400 text-sm bg-red-900/30 rounded-lg p-3"></div>

        <div class="flex gap-3 pt-2">
          <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-black font-bold py-2 px-4 rounded-lg">Guardar</button>
          <button type="button" onclick="cerrarModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = '/admin/index.html';
    const api = (url, opts = {}) => fetch(url, { headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, ...opts });
    function logout() { localStorage.removeItem('adminToken'); window.location.href = '/admin/index.html'; }

    const dias = [
      { key: 'horarioLunes', label: 'Lunes' },
      { key: 'horarioMartes', label: 'Martes' },
      { key: 'horarioMiercoles', label: 'Miércoles' },
      { key: 'horarioJueves', label: 'Jueves' },
      { key: 'horarioViernes', label: 'Viernes' },
      { key: 'horarioSabado', label: 'Sábado' },
      { key: 'horarioDomingo', label: 'Domingo' },
    ];

    function renderHorariosForm(barbero = null) {
      const container = document.getElementById('horariosForm');
      container.innerHTML = dias.map(d => {
        const horario = barbero?.[d.key];
        const activo = !!horario;
        return `
          <div class="flex items-center gap-3 bg-gray-700/50 rounded-lg p-3">
            <input type="checkbox" id="chk_${d.key}" ${activo ? 'checked' : ''} onchange="toggleHorario('${d.key}')" class="w-4 h-4 accent-amber-500">
            <span class="w-20 text-sm text-gray-300">${d.label}</span>
            <div id="hrs_${d.key}" class="${activo ? '' : 'hidden'} flex items-center gap-2 flex-1">
              <input type="time" id="ini_${d.key}" value="${horario?.inicio || '09:00'}" class="bg-gray-600 text-white rounded px-2 py-1 text-sm">
              <span class="text-gray-400">a</span>
              <input type="time" id="fin_${d.key}" value="${horario?.fin || '18:00'}" class="bg-gray-600 text-white rounded px-2 py-1 text-sm">
            </div>
            ${!activo ? '<span class="text-gray-500 text-sm">No trabaja</span>' : ''}
          </div>
        `;
      }).join('');
    }

    function toggleHorario(key) {
      const chk = document.getElementById(`chk_${key}`);
      const hrs = document.getElementById(`hrs_${key}`);
      if (chk.checked) hrs.classList.remove('hidden');
      else hrs.classList.add('hidden');
    }

    function leerHorarios() {
      const horarios = {};
      dias.forEach(d => {
        const chk = document.getElementById(`chk_${d.key}`);
        if (chk?.checked) {
          horarios[d.key] = {
            inicio: document.getElementById(`ini_${d.key}`).value,
            fin: document.getElementById(`fin_${d.key}`).value,
          };
        } else {
          horarios[d.key] = null;
        }
      });
      return horarios;
    }

    async function cargarBarberos() {
      const res = await api('/api/admin/barberos');
      if (res.status === 401) { logout(); return; }
      const barberos = await res.json();
      const container = document.getElementById('listaBarberos');
      if (barberos.length === 0) {
        container.innerHTML = '<div class="text-gray-500">No hay barberos registrados aún.</div>';
        return;
      }
      container.innerHTML = barberos.map(b => `
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 flex flex-col gap-3">
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-3">
              ${b.fotoUrl ? `<img src="${b.fotoUrl}" class="w-12 h-12 rounded-full object-cover" onerror="this.style.display='none'">` : '<div class="w-12 h-12 rounded-full bg-amber-500/20 flex items-center justify-center text-2xl">✂️</div>'}
              <div>
                <div class="font-bold">${b.nombre}</div>
                <div class="text-sm text-gray-400">${b.telefono}</div>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded-full text-xs ${b.activo ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${b.activo ? 'Activo' : 'Inactivo'}</span>
          </div>
          ${b.especialidades?.length ? `<div class="text-sm text-amber-400">${b.especialidades.join(' · ')}</div>` : ''}
          <div class="text-xs text-gray-500">
            ${dias.filter(d => b[d.key]).map(d => `${d.label.substring(0,3)}: ${b[d.key].inicio}-${b[d.key].fin}`).join(' | ')}
          </div>
          <div class="flex gap-2 pt-1">
            <button onclick='editarBarbero(${JSON.stringify(b)})' class="flex-1 text-sm bg-blue-700 hover:bg-blue-600 py-1.5 rounded-lg">✏️ Editar</button>
            <button onclick="toggleActivo('${b.id}', ${b.activo})" class="flex-1 text-sm ${b.activo ? 'bg-red-800 hover:bg-red-700' : 'bg-green-800 hover:bg-green-700'} py-1.5 rounded-lg">
              ${b.activo ? '🔕 Desactivar' : '✅ Activar'}
            </button>
            <button onclick="conectarCalendario('${b.id}')" class="flex-1 text-sm bg-gray-700 hover:bg-gray-600 py-1.5 rounded-lg">📅 Calendar</button>
          </div>
        </div>
      `).join('');
    }

    function abrirModal(barbero = null) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitulo').textContent = barbero ? 'Editar Barbero' : 'Nuevo Barbero';
      document.getElementById('barberId').value = barbero?.id || '';
      document.getElementById('bNombre').value = barbero?.nombre || '';
      document.getElementById('bTelefono').value = barbero?.telefono || '';
      document.getElementById('bEspecialidades').value = barbero?.especialidades?.join(', ') || '';
      document.getElementById('bFotoUrl').value = barbero?.fotoUrl || '';
      document.getElementById('formError').classList.add('hidden');
      renderHorariosForm(barbero);
    }

    function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

    function editarBarbero(b) { abrirModal(b); }

    async function toggleActivo(id, activo) {
      if (!confirm(`¿${activo ? 'Desactivar' : 'Activar'} este barbero?`)) return;
      await api(`/api/admin/barberos/${id}`, { method: 'PUT', body: JSON.stringify({ activo: !activo }) });
      cargarBarberos();
    }

    async function conectarCalendario(id) {
      const res = await api(`/api/admin/calendar/auth/${id}`);
      const data = await res.json();
      if (data.url) window.open(data.url, '_blank');
    }

    document.getElementById('barberForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('barberId').value;
      const esp = document.getElementById('bEspecialidades').value.split(',').map(s => s.trim()).filter(Boolean);
      const body = {
        nombre: document.getElementById('bNombre').value,
        telefono: document.getElementById('bTelefono').value,
        especialidades: esp,
        fotoUrl: document.getElementById('bFotoUrl').value || null,
        ...leerHorarios(),
      };
      const url = id ? `/api/admin/barberos/${id}` : '/api/admin/barberos';
      const method = id ? 'PUT' : 'POST';
      const res = await api(url, { method, body: JSON.stringify(body) });
      const data = await res.json();
      if (res.ok) { cerrarModal(); cargarBarberos(); }
      else { const err = document.getElementById('formError'); err.textContent = data.error; err.classList.remove('hidden'); }
    });

    cargarBarberos();
  </script>
</body>
</html>
